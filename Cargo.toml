[workspace]
resolver = "2"
members = [
  "crates/core",
  "crates/macros",
  "crates/mesh",
  "crates/traits",
  "crates/xtask",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
authors = ["Sam Hart"]

[workspace.lints.rust]
unreachable_pub = "warn"
unused_must_use = "deny"

[workspace.lints.clippy]
as_conversions = "warn"
cast_possible_truncation = "deny"
cast_sign_loss = "deny"
dbg_macro = "deny"
disallowed_methods = "deny"
disallowed_types = "deny"
float_arithmetic = "deny"
needless_pass_by_value = "warn"
todo = "deny"
unimplemented = "deny"
wildcard_imports = "warn"

[workspace.dependencies]
# local
telltale-types   = { path = "../telltale/rust/types" }
telltale-macros  = { path = "../telltale/rust/macros" }
telltale-runtime = { path = "../telltale/rust/runtime" }

# async
futures     = "0.3"
tokio       = { version = "1", features = ["full"] }
async-trait = "0.1"

# serialization
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
bincode    = "1"

# error handling
thiserror = "1"
anyhow    = "1"

# tracing
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# utilities
rand = "0.8"
uuid = { version = "1", features = ["v4", "serde"] }
