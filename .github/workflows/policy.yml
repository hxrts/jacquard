name: Policy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: "policy-${{ github.ref }}"
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  policy:
    name: Architectural Policy
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Docs Link Check
        run: ./scripts/toolkit-shell.sh toolkit-xtask check docs-link-check --repo-root . --config policy/toolkit.toml
      - name: Docs Semantic Drift
        run: ./scripts/toolkit-shell.sh toolkit-xtask check docs-semantic-drift --repo-root . --config policy/toolkit.toml
      - name: Proc Macro Scope
        run: ./scripts/toolkit-shell.sh toolkit-xtask check proc-macro-scope --repo-root . --config policy/toolkit.toml
      - name: Crate Root Policy
        run: ./scripts/toolkit-shell.sh toolkit-xtask check crate-root-policy --repo-root . --config policy/toolkit.toml
      - name: Ignored Result
        run: ./scripts/toolkit-shell.sh toolkit-xtask check ignored-result --repo-root . --config policy/toolkit.toml
      - name: Unsafe Boundary
        run: ./scripts/toolkit-shell.sh toolkit-xtask check unsafe-boundary --repo-root . --config policy/toolkit.toml
      - name: Bool Param
        run: ./scripts/toolkit-shell.sh toolkit-xtask check bool-param --repo-root . --config policy/toolkit.toml
      - name: Must Use Public Return
        run: ./scripts/toolkit-shell.sh toolkit-xtask check must-use-public-return --repo-root . --config policy/toolkit.toml
      - name: Assert Shape
        run: ./scripts/toolkit-shell.sh toolkit-xtask check assert-shape --repo-root . --config policy/toolkit.toml
      - name: Drop Side Effects
        run: ./scripts/toolkit-shell.sh toolkit-xtask check drop-side-effects --repo-root . --config policy/toolkit.toml
      - name: Recursion Guard
        run: ./scripts/toolkit-shell.sh toolkit-xtask check recursion-guard --repo-root . --config policy/toolkit.toml
      - name: Naming Units
        run: ./scripts/toolkit-shell.sh toolkit-xtask check naming-units --repo-root . --config policy/toolkit.toml
      - name: Limit Constant
        run: ./scripts/toolkit-shell.sh toolkit-xtask check limit-constant --repo-root . --config policy/toolkit.toml
      - name: Public Type Width
        run: ./scripts/toolkit-shell.sh toolkit-xtask check public-type-width --repo-root . --config policy/toolkit.toml
      - name: Dependency Policy
        run: ./scripts/toolkit-shell.sh toolkit-xtask check dependency-policy --repo-root . --config policy/toolkit.toml
      - name: Test Boundaries
        run: ./scripts/toolkit-shell.sh toolkit-xtask check test-boundaries --repo-root . --config policy/toolkit.toml
      - name: Trait Purity
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check trait-purity
      - name: Crate Boundary
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check crate-boundary
      - name: Adapter Boundary
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check adapter-boundary
      - name: DX Surface
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check dx-surface
      - name: DRY Code
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check dry-code
      - name: Transport Authoring Boundary
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check transport-authoring-boundary
      - name: Transport Ownership Boundary
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check transport-ownership-boundary
      - name: Router Round Boundary
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check router-round-boundary
      - name: Reference Bridge Boundary
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check reference-bridge-boundary
      - name: Simulator Boundary
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check simulator-boundary
      - name: Ownership Invariants
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check ownership-invariants
      - name: No usize in Models
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check no-usize-in-models
      - name: Result Must Use
        run: ./scripts/toolkit-shell.sh toolkit-xtask check result-must-use --repo-root . --config policy/toolkit.toml
      - name: Proof Bearing Actions
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check proof-bearing-actions
      - name: Surface Classification
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check surface-classification
      - name: Rust Style Guide
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check rust-style-guide
      - name: Field Code Map
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check field-code-map
      - name: Checkpoint Namespacing
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check checkpoint-namespacing
      - name: Engine Service Boundary
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check engine-service-boundary
      - name: Invariant Specs
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check invariant-specs
      - name: Fail-Closed Ordering
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check fail-closed-ordering
      - name: No Scratch Refs in Rust
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check no-scratch-refs-in-rust
      - name: Pathway Async Boundary
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check pathway-async-boundary
      - name: Pathway Choreography
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check pathway-choreography
      - name: Pathway Choreography Validate
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check pathway-choreography --validate
      - name: Routing Invariants
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check routing-invariants
      - name: Routing Invariants Validate
        run: cargo run --manifest-path policy/xtask/Cargo.toml -- check routing-invariants --validate
      - name: Install cargo-dylint
        run: ./scripts/toolkit-shell.sh toolkit-install-dylint
      - name: Dylint Trait Purity
        run: ./scripts/toolkit-shell.sh toolkit-dylint --repo-root . --toolkit-lint trait_purity --all -- --all-targets
      - name: Dylint Model Policy
        run: ./scripts/toolkit-shell.sh toolkit-dylint --repo-root . --lint-path ./policy/lints/model_policy --all -- --all-targets
      - name: Dylint Routing Invariants
        run: ./scripts/toolkit-shell.sh toolkit-dylint --repo-root . --lint-path ./policy/lints/routing_invariants --all -- --all-targets
      - name: Dylint Trait Must Use
        run: ./scripts/toolkit-shell.sh toolkit-dylint --repo-root . --toolkit-lint trait_must_use --all -- --all-targets
      - name: Dylint Naked Map Err
        run: ./scripts/toolkit-shell.sh toolkit-dylint --repo-root . --toolkit-lint naked_map_err --all -- --all-targets
