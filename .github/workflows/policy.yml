name: Policy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: "policy-${{ github.ref }}"
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  policy:
    name: Architectural Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Docs Link Check
        run: nix develop --command cargo xtask check docs-link-check
      - name: Docs Semantic Drift
        run: nix develop --command cargo xtask check docs-semantic-drift
      - name: Proc Macro Scope
        run: nix develop --command cargo xtask check proc-macro-scope
      - name: Test Boundaries
        run: nix develop --command cargo xtask check test-boundaries
      - name: Trait Purity
        run: nix develop --command cargo xtask check trait-purity
      - name: Crate Boundary
        run: nix develop --command cargo xtask check crate-boundary
      - name: Transport Authoring Boundary
        run: nix develop --command cargo xtask check transport-authoring-boundary
      - name: Transport Ownership Boundary
        run: nix develop --command cargo xtask check transport-ownership-boundary
      - name: Ownership Invariants
        run: nix develop --command cargo xtask check ownership-invariants
      - name: No usize in Models
        run: nix develop --command cargo xtask check no-usize-in-models
      - name: Result Must Use
        run: nix develop --command cargo xtask check result-must-use
      - name: Proof Bearing Actions
        run: nix develop --command cargo xtask check proof-bearing-actions
      - name: Surface Classification
        run: nix develop --command cargo xtask check surface-classification
      - name: Checkpoint Namespacing
        run: nix develop --command cargo xtask check checkpoint-namespacing
      - name: Engine Service Boundary
        run: nix develop --command cargo xtask check engine-service-boundary
      - name: Invariant Specs
        run: nix develop --command cargo xtask check invariant-specs
      - name: Fail-Closed Ordering
        run: nix develop --command cargo xtask check fail-closed-ordering
      - name: No Scratch Refs in Rust
        run: nix develop --command cargo xtask check no-scratch-refs-in-rust
      - name: Mesh Choreography
        run: nix develop --command cargo xtask check mesh-choreography
      - name: Mesh Choreography Validate
        run: nix develop --command cargo xtask check mesh-choreography --validate
      - name: Routing Invariants
        run: nix develop --command cargo xtask check routing-invariants
      - name: Routing Invariants Validate
        run: nix develop --command cargo xtask check routing-invariants --validate
      - name: Install cargo-dylint
        run: nix develop ./nix/nightly --command install-dylint
      - name: Dylint Trait Purity
        run: nix develop ./nix/nightly --command cargo dylint --path lints/trait_purity --all -- --all-targets
      - name: Dylint Model Policy
        run: nix develop ./nix/nightly --command cargo dylint --path lints/model_policy --all -- --all-targets
      - name: Dylint Routing Invariants
        run: nix develop ./nix/nightly --command cargo dylint --path lints/routing_invariants --all -- --all-targets
      - name: Dylint Trait Must Use
        run: nix develop ./nix/nightly --command cargo dylint --path lints/trait_must_use --all -- --all-targets
      - name: Dylint Naked Map Err
        run: nix develop ./nix/nightly --command cargo dylint --path lints/naked_map_err --all -- --all-targets
