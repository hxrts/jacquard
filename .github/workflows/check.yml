name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: "check-${{ github.ref }}"
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  format-and-summary:
    name: Format And Summary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Format Check
        run: ./scripts/toolkit-shell.sh toolkit-fmt --all -- --check
      - name: Generate Summary
        run: ./scripts/gen-summary.sh

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: dtolnay/rust-toolchain@stable
      - name: Generate Summary
        run: ./scripts/gen-summary.sh
      - name: Clippy
        run: nix develop --command cargo clippy --workspace --all-targets -- -D warnings

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: dtolnay/rust-toolchain@stable
      - name: Generate Summary
        run: ./scripts/gen-summary.sh
      - name: Tests
        run: nix develop --command cargo test --workspace

  lean-style:
    name: Lean Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Lean Style
        run: nix develop --command just lean-style

  wasm-check:
    name: Wasm Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Wasm Check
        run: nix develop --command just wasm-check

  wasm-reference-client-test:
    name: Wasm Reference Client Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Wasm Reference Client Test
        run: nix develop --command just wasm-test-reference-client
