name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: "check-${{ github.ref }}"
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    name: Format, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout telltale sibling
        run: git clone --depth 1 https://github.com/hxrts/telltale.git ../telltale
      - uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Format Check
        run: nix develop ./nix/nightly --command cargo-fmt-nightly --all -- --check
      - name: Clippy
        run: nix develop --command cargo clippy --workspace -- -D warnings
      - name: Tests
        run: nix develop --command cargo test --workspace
