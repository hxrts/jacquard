disallowed-methods = [
  { path = "blake3::hash", reason = "Use the jacquard hasher trait boundary instead of calling BLAKE3 directly." },
  { path = "blake3::keyed_hash", reason = "Use the jacquard hasher trait boundary instead of calling BLAKE3 directly." },
  { path = "blake3::derive_key", reason = "Use the jacquard hasher trait boundary instead of calling BLAKE3 directly." },
  { path = "blake3::Hasher::new", reason = "Use the jacquard hasher trait boundary instead of constructing a BLAKE3 hasher directly." },
  { path = "blake3::Hasher::new_keyed", reason = "Use the jacquard hasher trait boundary instead of constructing a BLAKE3 hasher directly." },
  { path = "blake3::Hasher::new_derive_key", reason = "Use the jacquard hasher trait boundary instead of constructing a BLAKE3 hasher directly." },
]

disallowed-types = [
  { path = "f32", reason = "Jacquard must remain fully deterministic and should not use floating-point types." },
  { path = "f64", reason = "Jacquard must remain fully deterministic and should not use floating-point types." },
  { path = "std::time::Instant", reason = "Use the typed jacquard time model instead of host wall-clock APIs." },
  { path = "std::time::SystemTime", reason = "Use the typed jacquard time model instead of host wall-clock APIs." },
  { path = "std::time::Duration", reason = "Use DurationMs instead of std::time::Duration." },
  { path = "sha2::Sha256", reason = "Jacquard uses BLAKE3 for all hashing. Use the jacquard Hashing trait." },
  { path = "sha2::Sha512", reason = "Jacquard uses BLAKE3 for all hashing. Use the jacquard Hashing trait." },
  { path = "sha2::Sha384", reason = "Jacquard uses BLAKE3 for all hashing. Use the jacquard Hashing trait." },
  { path = "sha2::Sha224", reason = "Jacquard uses BLAKE3 for all hashing. Use the jacquard Hashing trait." },
]
