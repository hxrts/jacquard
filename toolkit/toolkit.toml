[checks.result_must_use]
enabled = true
include_paths = ["crates/traits/src"]

[checks.lean_style]
enabled = true
include_paths = ["verification/Field"]
exclude_path_parts = ["/.lake/", "/build/", "/lake-packages/"]
non_trivial_file_lines = 120
section_header_min_lines = 80
max_file_lines = 500
max_decl_lines_target = 30
max_decl_lines_hard_limit = 50
enforce_target_decl_lines = false
require_problem_statement = true
enforce_top_of_file_structure = true
require_section_headers = true
require_over_limit_comment = true
require_explanatory_comment_for_long_blocks = true
require_public_theorem_lemma_docstrings = false
banned_imports = ["Field.Assumptions"]
banned_import_exemptions = ["verification/Field/Field.lean"]
forbid_sorry = false
require_todo_for_sorry = true
todo_comment_markers = ["TODO:"]
over_limit_comment_markers = ["long-block-exception:"]

[[checks.lean_style.file_exemptions]]
path = "verification/Field/Model/Instance.lean"
reason = "unified local-model realization still exceeds the file-size target while the remaining harmonization plan is open"

[[checks.lean_style.file_exemptions]]
path = "verification/Field/Model/API.lean"
reason = "the central local semantic API remains oversized until the shared model surface is split more aggressively"

[[checks.lean_style.file_exemptions]]
path = "verification/Field/Router/Canonical.lean"
reason = "canonical selector semantics still live in one large proof surface pending the remaining selector-family refactor"

[[checks.lean_style.file_exemptions]]
path = "verification/Field/Model/Refinement.lean"
reason = "reduction-preservation theorems are still concentrated in one module while the refinement ladder is being factored"

[[checks.lean_style.file_exemptions]]
path = "verification/Field/System/Bounded.lean"
reason = "bounded system execution and accounting theorems remain co-located until the remaining cleanup plan is finished"

[[checks.lean_style.file_exemptions]]
path = "verification/Field/AssumptionTheorems.lean"
reason = "assumption packaging and theorem exports remain consolidated while the assumption-surface split is still in progress"

[checks.docs_semantic_drift]
enabled = true
docs_roots = ["docs", "crates", "scripts", ".github"]
manifest_path = "Cargo.toml"
planned_crates = [
  "jacquard-pathway",
  "jacquard-router",
  "jacquard-simulator",
]

[checks.crate_root_policy]
enabled = true
required_attributes = [
  "#![forbid(unsafe_code)]",
]

[checks.ignored_result]
enabled = true
include_paths = ["crates"]
allowed_comment_markers = ["allow-ignored-result:", "intentionally ignore result"]

[checks.unsafe_boundary]
enabled = true
include_paths = ["crates"]
allowed_path_parts = ["/raw/", "/ffi/", "/sys/"]
required_comment_markers = ["Safety:"]

[checks.must_use_public_return]
enabled = true
include_paths = ["crates"]
exclude_path_parts = [
  "crates/core/src/authoring.rs",
  "crates/mem-link-profile/src/",
  "crates/mem-node-profile/src/",
  "crates/simulator/src/presets.rs",
]
allowed_return_type_prefixes = ["Result", "Option"]

[checks.public_type_width]
enabled = true
include_paths = ["crates"]
exclude_path_parts = [
  "crates/reference-client/src/bridge.rs",
  "crates/simulator/src/replay.rs",
]
banned_types = ["isize", "f32", "f64"]

[checks.dependency_policy]
enabled = true
manifest_roots = ["crates"]
require_default_features_false = ["serde", "tokio", "futures"]
banned_dependencies = []

[checks.lean_escape_hatches]
enabled = true
include_paths = ["verification/Field"]
exclude_path_parts = ["/.lake/", "/build/", "/lake-packages/"]

[checks.lean_escape_hatches.kind_thresholds]
noncomputable = 500
native_decide = 10
opaque = 61
empty_theorem_shell = 2

[checks.text_formatting]
enabled = true
include_paths = ["crates", "docs", "verification", "toolkit"]
exclude_path_parts = ["/.lake/", "/build/", "/target/", "/lake-packages/"]

[toolkit.exemptions]
bare_primitives_exempt_paths = [
  "crates/mem-link-profile/src/",
  "crates/reference-client/src/",
  "/tests/",
  "/benches/",
]

[[toolkit.exemptions.style_guide]]
symbol = "jacquard_pathway::routing_invariants::run"
reason = "long-block-exception: rule coordination workflow"

[[toolkit.exemptions.ownership_permits]]
name = "mem-link-profile-test-only"
reason = "test infrastructure crate; mirrors reference-client"
